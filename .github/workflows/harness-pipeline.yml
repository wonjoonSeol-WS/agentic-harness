# Agentic Harness Pipeline
# Issue labeled "auto" → Plan → Approve → Execute → Review → PR → CI Gate
name: Agentic Harness Pipeline

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: harness-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  gate:
    name: Check Trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      phase: ${{ steps.check.outputs.phase }}
    steps:
      - name: Evaluate trigger
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { payload } = context;
            const labels = payload.issue?.labels?.map(l => l.name) || [];
            if (payload.action === 'labeled' && payload.label?.name === 'auto') {
              core.setOutput('should_run', 'true');
              core.setOutput('phase', 'plan');
              return;
            }
            if (payload.action === 'created' && labels.includes('auto')) {
              if (payload.comment?.user?.type === 'Bot') {
                core.setOutput('should_run', 'false');
                return;
              }
              const body = (payload.comment?.body || '').toLowerCase();
              if (['/approve', 'approved', 'lgtm'].some(w => body.includes(w)) && labels.includes('harness:planning')) {
                core.setOutput('should_run', 'true');
                core.setOutput('phase', 'execute');
              } else {
                core.setOutput('should_run', 'false');
              }
              return;
            }
            core.setOutput('should_run', 'false');

  plan:
    name: Plan
    needs: gate
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.phase == 'plan'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Add planning label
        run: |
          gh label create "harness:planning" --color 0E8A16 --force 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} --add-label "harness:planning"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Plan Agent
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)
          ISSUE_TITLE=$(gh issue view ${{ github.event.issue.number }} --json title -q .title)

          cat <<PROMPT | claude -p --allowedTools "Read,Bash,Grep,Glob" -
          You are in the PLAN phase.
          Read prompts/planner.md for your full instructions.
          Read AGENTS.md and harness.yml for project context.

          Issue #${{ github.event.issue.number }}: ${ISSUE_TITLE}

          ${ISSUE_BODY}

          After creating your plan, post it as a comment on issue #${{ github.event.issue.number }} using:
          gh issue comment ${{ github.event.issue.number }} --body 'your plan here'

          End the comment with: Reply with /approve to start execution.
          PROMPT
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  execute:
    name: Execute
    needs: gate
    if: needs.gate.outputs.should_run == 'true' && needs.gate.outputs.phase == 'execute'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      branch: ${{ steps.branch.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Update label
        run: |
          gh label create "harness:executing" --color 1D76DB --force 2>/dev/null || true
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "harness:planning" --add-label "harness:executing"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create branch
        id: branch
        run: |
          BRANCH="harness/${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Executor Agent
        run: |
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q .body)

          cat <<PROMPT | claude -p --allowedTools "Read,Write,Edit,Bash,Grep,Glob" -
          You are in the EXECUTE phase.
          Read prompts/executor.md for your full instructions.
          Read harness.yml for verification commands (execution.post_commands).
          Read AGENTS.md for project context.

          Implement the approved plan for issue #${{ github.event.issue.number }}.

          ${ISSUE_BODY}

          You are on branch ${{ steps.branch.outputs.name }}.
          Write the code, run verification commands, fix failures, then commit.
          Do NOT push — the workflow handles that.
          PROMPT
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push branch
        run: git push origin ${{ steps.branch.outputs.name }} --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  review:
    name: Review (${{ matrix.perspective }})
    needs: execute
    strategy:
      matrix:
        perspective: [review-functional, review-nonfunctional]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.execute.outputs.branch }}
          fetch-depth: 50

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Reviewer
        run: |
          PROMPT_FILE="reviewer-functional.md"
          if [ "${{ matrix.perspective }}" = "review-nonfunctional" ]; then
            PROMPT_FILE="reviewer-nonfunctional.md"
          fi

          cat <<PROMPT | claude -p --allowedTools "Read,Bash,Grep,Glob" -
          You are in the ${{ matrix.perspective }} phase.
          Read prompts/${PROMPT_FILE} for your instructions.
          Read AGENTS.md for project context.

          Review the changes on this branch (use git diff main...HEAD).
          Post your findings as a comment on issue #${{ github.event.issue.number }} using gh issue comment.
          PROMPT
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-pr:
    name: Create PR
    needs: [execute, review]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.execute.outputs.branch }}

      - name: Create PR
        run: |
          TITLE="$(gh issue view ${{ github.event.issue.number }} --json title -q .title)"
          gh label create "agentic-harness" --color 5319E7 --force 2>/dev/null || true
          gh label create "harness:in-review" --color D93F0B --force 2>/dev/null || true
          gh pr create \
            --head "${{ needs.execute.outputs.branch }}" \
            --title "feat: ${TITLE}" \
            --body "Closes #${{ github.event.issue.number }}" \
            --label "agentic-harness"
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "harness:executing" --add-label "harness:in-review"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  report-failure:
    name: Report Failure
    needs: [gate, plan, execute, review, create-pr]
    if: always() && (needs.plan.result == 'failure' || needs.execute.result == 'failure' || needs.review.result == 'failure' || needs.create-pr.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Post failure comment
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            -R ${{ github.repository }} \
            --body "## Pipeline Failed

          See the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

          Re-trigger by removing and re-adding the \`auto\` label."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
