# =============================================================================
# Agentic Harness — PR Feedback Handler
# =============================================================================
# Responds to human review comments on PRs created by the harness.
# The agent reads the feedback, fixes the code, and pushes updated commits.
#
# Setup: Copy this file to .github/workflows/harness-pr-feedback.yml
# =============================================================================

name: Agentic Harness — PR Feedback

on:
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

concurrency:
  group: harness-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  respond:
    name: Respond to Review
    if: |
      contains(github.event.pull_request.labels.*.name, 'agentic-harness') &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # Shallow clone for large repos. Override in harness.yml: execution.checkout_depth
          fetch-depth: 50

      - name: Run Respond Agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            A reviewer left comments on PR #${{ github.event.pull_request.number }}.
            Read prompts/executor.md for coding instructions.
            Read harness.yml for verification commands.
            Address the review feedback, fix the code, run verification commands, commit and push.
          allowed_tools: "Read,Write,Edit,Bash,Grep,Glob"
          model: "claude-opus-4-6"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
